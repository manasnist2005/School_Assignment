<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f7fb; }
    h1 { text-align:center; }
    .card {
      background:white;
      padding:20px;
      margin:20px auto;
      max-width:900px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    canvas { margin-top:20px; }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }
    th, td {
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }
    th { background:#1565C0; color:white; }
  </style>
</head>

<body>

<h1>📊 Student Dashboard</h1>

<div class="card">
  <h2>Overall Performance</h2>
  <canvas id="scoreChart"></canvas>
</div>

<div class="card">
  <h2>Subject Wise Average</h2>
  <canvas id="subjectChart"></canvas>
</div>

<div class="card">
  <h2>Test History</h2>
  <table id="historyTable">
    <tr>
      <th>Subject</th>
      <th>Score</th>
      <th>%</th>
      <th>Date</th>
    </tr>
  </table>
</div>

<script>
const data = JSON.parse(localStorage.getItem("quizResults") || "[]");

// ── Table ─────────────────
const table = document.getElementById("historyTable");

data.forEach(d => {
  const row = `<tr>
    <td>${d.subject}</td>
    <td>${d.score}/${d.total}</td>
    <td>${d.percentage}%</td>
    <td>${d.dateTime}</td>
  </tr>`;
  table.innerHTML += row;
});

// ── Chart 1: Score Trend ──
const labels = data.map(d => d.dateTime);
const scores = data.map(d => d.percentage);

new Chart(document.getElementById("scoreChart"), {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: "Score %",
      data: scores,
      fill: false
    }]
  }
});

// ── Chart 2: Subject Avg ──
const subjectMap = {};

data.forEach(d => {
  if (!subjectMap[d.subject]) {
    subjectMap[d.subject] = [];
  }
  subjectMap[d.subject].push(d.percentage);
});

const subjects = Object.keys(subjectMap);
const averages = subjects.map(s => {
  const arr = subjectMap[s];
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
});

new Chart(document.getElementById("subjectChart"), {
  type: 'bar',
  data: {
    labels: subjects,
    datasets: [{
      label: "Average %",
      data: averages
    }]
  }
});
</script>

</body>
</html>
