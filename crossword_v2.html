<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Crossword Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .controls {
            margin-bottom: 25px;
            text-align: center;
            font-size: 20px;
            color: #2980b9;
        }
        
        .game-area {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* 12x12 Grid styling */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 35px); /* Adjusted for 12x12 */
            grid-template-rows: repeat(12, 35px);
            gap: 2px;
            background-color: #34495e;
            padding: 6px;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .cell {
            background-color: transparent;
            position: relative;
        }
        .cell.active {
            background-color: white;
            border-radius: 3px;
        }
        .cell input {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: none;
            text-align: center;
            font-size: 18px; /* Slightly smaller text */
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            background: transparent;
            color: #2c3e50;
            border-radius: 3px;
        }
        .cell input:focus {
            background-color: #e8f4f8;
        }
        .cell .number {
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 10px;
            font-weight: bold;
            color: #7f8c8d;
            pointer-events: none;
        }

        .hints {
            max-width: 320px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .hints h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        .hints ul { list-style-type: none; padding-left: 0; }
        .hints li { margin-bottom: 10px; font-size: 14px; line-height: 1.4; }

        #success-message {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #2ecc71;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Crossword Explorer</h1>
    
    <div class="controls">
        <strong id="puzzle-title">Loading Challenge...</strong>
    </div>

    <div class="game-area">
        <div class="grid" id="crossword-grid"></div>
        <div class="hints">
            <h3>Across</h3>
            <ul id="hints-across"></ul>
            <h3>Down</h3>
            <ul id="hints-down"></ul>
        </div>
    </div>

    <div id="success-message">🎉 Brilliant work, Advik! You solved the 12x12 grid! 🎉</div>

    <script>
        let puzzles = [];
        let currentIndex = 0;
        const GRID_SIZE = 12;

        // Fetch the JSON data
        fetch('crossworddata_v2.json')
            .then(response => response.json())
            .then(data => {
                puzzles = data;
                
                // Check URL for a specific set (e.g., ?set=2)
                const urlParams = new URLSearchParams(window.location.search);
                const requestedSet = urlParams.get('set');
                
                if (requestedSet) {
                    const foundIndex = puzzles.findIndex(p => p.id == requestedSet);
                    if (foundIndex !== -1) {
                        currentIndex = foundIndex;
                    }
                }
                
                loadPuzzle(currentIndex);
            })
            .catch(error => {
                document.getElementById('puzzle-title').innerText = "Error loading crossworddata_v2.json";
                console.error('Error:', error);
            });

        function loadPuzzle(index) {
            const puzzle = puzzles[index];
            document.getElementById('puzzle-title').innerText = puzzle.title;
            document.getElementById('success-message').style.display = 'none';

            buildGrid(puzzle.words);
            buildHints(puzzle.words);
        }

        function buildGrid(words) {
            const gridContainer = document.getElementById('crossword-grid');
            gridContainer.innerHTML = '';

            // Initialize a 12x12 logical grid
            let logicalGrid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));

            // Populate logical grid with letters and numbers
            words.forEach((wordObj, i) => {
                const wordLength = wordObj.word.length;
                const number = i + 1;

                for (let j = 0; j < wordLength; j++) {
                    let r = wordObj.dir === 'H' ? wordObj.row : wordObj.row + j;
                    let c = wordObj.dir === 'H' ? wordObj.col + j : wordObj.col;

                    if (!logicalGrid[r][c]) {
                        logicalGrid[r][c] = { letter: wordObj.word[j], number: null };
                    }
                    if (j === 0 && !logicalGrid[r][c].number) {
                        logicalGrid[r][c].number = number;
                    }
                }
            });

            // Render the physical grid
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';

                    const cellData = logicalGrid[r][c];
                    
                    if (cellData) {
                        cellDiv.classList.add('active');
                        
                        if (cellData.number) {
                            const numSpan = document.createElement('span');
                            numSpan.className = 'number';
                            numSpan.innerText = cellData.number;
                            cellDiv.appendChild(numSpan);
                        }

                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.dataset.letter = cellData.letter;
                        
                        input.addEventListener('input', function() {
                            this.value = this.value.toUpperCase();
                            checkWinCondition();
                        });

                        cellDiv.appendChild(input);
                    }
                    gridContainer.appendChild(cellDiv);
                }
            }
        }

        function buildHints(words) {
            const acrossList = document.getElementById('hints-across');
            const downList = document.getElementById('hints-down');
            acrossList.innerHTML = '';
            downList.innerHTML = '';

            words.forEach((wordObj, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${i + 1}.</strong> ${wordObj.hint}`;
                
                if (wordObj.dir === 'H') {
                    acrossList.appendChild(li);
                } else {
                    downList.appendChild(li);
                }
            });
        }

        function checkWinCondition() {
            const inputs = document.querySelectorAll('.cell input');
            let isWon = true;

            inputs.forEach(input => {
                if (input.value !== input.dataset.letter) {
                    isWon = false;
                }
            });

            if (isWon && inputs.length > 0) {
                document.getElementById('success-message').style.display = 'block';
                // Lock inputs
                inputs.forEach(input => input.disabled = true);
            }
        }
    </script>
</body>
</html>
